name: Build desktop apps

# Builds the Windows installer from desktop/. Runs on every push to the working
# branch (publishing to the "desktop-latest" release), a desktop-v* tag, or a
# manual "Run workflow".

on:
  push:
    branches:
      - 'claude/focus-planner-spec-review-wfa68l'
    tags:
      - 'desktop-v*'
    paths:
      - 'desktop/**'
      - '.github/workflows/desktop.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: desktop
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build Windows app
        run: npm run dist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: focus-planner-win
          path: desktop/dist/*.exe
          if-no-files-found: ignore

  release:
    needs: build
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish latest release
        if: startsWith(github.ref, 'refs/heads/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: desktop-latest
          name: Focus Planner Desktop (latest)
          body: |
            Windows desktop build. Download **Focus Planner-<version>-win-x64.exe**
            and run it. If SmartScreen warns, click **More info → Run anyway**.
          files: artifacts/**/*.exe
          fail_on_unmatched_files: false

      - name: Publish tagged release
        if: startsWith(github.ref, 'refs/tags/desktop-v')
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.exe
          fail_on_unmatched_files: false
