name: Build desktop apps

# Builds installable Mac / Windows / Linux apps from desktop/.
# Runs automatically on every push to the working branch (so the finished
# installers show up on the "desktop-latest" release), and also on a
# `desktop-v*` tag or a manual "Run workflow".

on:
  push:
    branches:
      - 'claude/focus-planner-spec-review-wfa68l'
    tags:
      - 'desktop-v*'
    paths:
      - 'desktop/**'
      - '.github/workflows/desktop.yml'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win
          - os: ubuntu-latest
            platform: linux
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: desktop
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build ${{ matrix.platform }} app
        run: npm run dist:${{ matrix.platform }}
        env:
          # Skip code-signing (no certificates in CI). Users may see an
          # "unidentified developer" prompt on first launch — normal for
          # unsigned builds.
          CSC_IDENTITY_AUTO_DISCOVERY: false
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: focus-planner-${{ matrix.platform }}
          path: |
            desktop/dist/*.dmg
            desktop/dist/*.zip
            desktop/dist/*.exe
            desktop/dist/*.AppImage
          if-no-files-found: ignore

  # Branch pushes publish a rolling "desktop-latest" release with direct
  # download links; a desktop-v* tag publishes a versioned release instead.
  release:
    needs: build
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish tagged release
        if: startsWith(github.ref, 'refs/tags/desktop-v')
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          fail_on_unmatched_files: false

      - name: Publish latest release
        if: startsWith(github.ref, 'refs/heads/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: desktop-latest
          name: Focus Planner Desktop (latest)
          body: |
            Latest desktop builds. Download the file for your computer:
            - **Mac (Apple Silicon):** the `-mac-arm64.dmg` (use `-x64` on an Intel Mac)
            - **Windows:** the `-win-x64.exe`
            - **Linux:** the `-linux-x64.AppImage`

            First launch shows an "unidentified developer / unknown publisher"
            warning because the app isn't code-signed yet — that's expected.
            Mac: right-click the app → Open → Open. Windows: More info → Run anyway.
          files: artifacts/**/*
          fail_on_unmatched_files: false
